robots:
  robot_a:
    role: supplier
    bridge_url: http://192.168.129.130:8091
    stream_url: http://192.168.129.130:5000/video
    exchange_pose: { x: 0.0, y: 0.0, yaw: 0.0 }
    params:
      approach_distance: 0.3
      arrival_threshold: 0.25
      label_confidence: 0.8
    # Empty list = classify anywhere. Add rectangles to restrict labeling.
    # map-frame meters: min_x/max_x/min_y/max_y
    classify_zones: []
    # classify_zones:
    #   - { name: ingredients, min_x: 0.5, max_x: 2.0, min_y: -0.5, max_y: 1.5 }
  robot_b:
    role: server
    bridge_url: http://192.168.129.24:8091
    stream_url: http://192.168.129.24:5000/video
    exchange_pose: { x: 0.0, y: 0.0, yaw: 0.0 }
    params:
      approach_distance: 0.3
      arrival_threshold: 0.25
      label_confidence: 0.8
    classify_zones: []
    # classify_zones:
    #   - { name: dishes, min_x: 0.5, max_x: 2.0, min_y: -0.5, max_y: 1.5 }
    #   - { name: customer, min_x: -1.0, max_x: 0.5, min_y: -1.0, max_y: 0.5 }

recipes:
  apple_pie: { ingredient: apple, dish: apple_pie }
  carrot_soup: { ingredient: carrot, dish: carrot_soup }
  banana_pudding: { ingredient: banana, dish: banana_pudding }
  orange: { ingredient: jelly, dish: orange }

classes:
  ingredients: [apple, banana, carrot, jelly]
  dishes: [apple_pie, carrot_soup, banana_pudding, orange]
  customer: bell

orchestrator:
  handoff_mode: both_arrived
  detection_timeout: 30.0
  handoff_timeout: 120.0
  poll_interval_sec: 0.25
